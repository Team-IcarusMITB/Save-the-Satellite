<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep the Satellite Alive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- TOP: Glass HUD (PvP Battle Arena Style) -->
        <div class="hud-container">
            <div class="hud-panel player1-panel">
                <div class="sat-name">PLAYER 1</div>
                <div class="hud-bar">
                    <div class="battery-bar-hud">
                        <div id="batteryBarP1" class="bar-fill"></div>
                    </div>
                    <span id="batteryPercentP1">100%</span>
                </div>
                <div class="stat-section">
                    <div class="stat-label">HEAT</div>
                    <div class="heat-bar-hud">
                        <div id="heatBarP1" class="heat-fill"></div>
                    </div>
                </div>
                <div class="status-text"><span id="statusIndicatorP1">☀️ ACTIVE</span></div>
            </div>

            <div class="hud-panel center-panel">
                <div class="survival-time">
                    <span>⏱️ Survival:</span>
                    <span id="survivalTime">0s</span>
                </div>
                <div class="solar-burst-info">
                    <span id="solarBurstIndicator">☀️ Solar Flare Ready</span>
                </div>
                <div class="system-status">
                    <span id="faultText">✅ All Systems Nominal</span>
                </div>
            </div>

            <div class="hud-panel player2-panel">
                <div class="sat-name">PLAYER 2</div>
                <div class="hud-bar">
                    <div class="battery-bar-hud">
                        <div id="batteryBarP2" class="bar-fill"></div>
                    </div>
                    <span id="batteryPercentP2">100%</span>
                </div>
                <div class="stat-section">
                    <div class="stat-label">HEAT</div>
                    <div class="heat-bar-hud">
                        <div id="heatBarP2" class="heat-fill"></div>
                    </div>
                </div>
                <div class="status-text"><span id="statusIndicatorP2">☀️ ACTIVE</span></div>
            </div>
        </div>

        <!-- MAIN: 3D Canvas -->
        <div class="canvas-container">
            <canvas id="gameCanvas" tabindex="0"></canvas>
        </div>

        <!-- Game Over Modal (hidden initially) -->
            <div id="gameOverModal" class="modal hidden">
                <div class="modal-content">
                    <h2>Mission Failed</h2>
                    <p>Satellite lost power.</p>
                    <div class="final-score">
                        <p>Survival Time: <span id="finalScore">0</span> seconds</p>
                        <p>Debris Hits: <span id="finalDebrisHits">0</span></p>
                    </div>
                    <div class="scoreboard-modal">
                        <h3>🏆 High Scores</h3>
                        <div id="scoreboardDisplay"></div>
                    </div>
                    <button id="restartGameButton" class="restart-game-button">
                        ↻ Restart Game
                    </button>
                    <button id="viewScoreboard" class="view-scores-button">
                        📊 View All Scores
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- DEBUG PANEL -->
    <div id="debugPanel" style="position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.9); color: #0f0; padding: 15px; font-family: monospace; font-size: 11px; z-index: 9999; border: 2px solid #0f0; max-width: 300px; max-height: 300px; overflow-y: auto;">
        <div>🛰️ SATELLITE DEBUG LOG</div>
        <div id="debugLog" style="margin-top: 10px; line-height: 1.4;"></div>
    </div>
    
    <!-- Three.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <!-- Game Scripts -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
